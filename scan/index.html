<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Barcode Scanner</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      background-color: #ffffff;
      color: #0f172a;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .scanner-header {
      display: none !important;
    }
    .scanner-app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background-color: #ffffff;
      color: #0f172a;
      position: relative;
    }
    .scanner-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background-color: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .scanner-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: #0284c7;
      font-size: 1.1rem;
    }
    .scanner-logo i {
      font-size: 1.25rem;
    }
    .scanner-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      background-color: #f1f5f9;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      font-weight: 500;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transition: all 0.3s ease;
    }
    .status-dot.red {
      background-color: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
    }
    .status-dot.green {
      background-color: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.8);
    }
    .status-dot.yellow {
      background-color: #eab308;
      box-shadow: 0 0 8px rgba(234, 179, 8, 0.8);
    }
    .scanner-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      gap: 24px;
    }
    .scanner-view-wrapper {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: 24px;
      overflow: hidden;
      border: 4px solid #ef4444; /* Default Red when not scanning */
      background-color: #020617;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.15);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .scanner-view-wrapper.scanning {
      border-color: #10b981;
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.35);
    }
    #camera-feed-box {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      overflow: hidden;
    }
    #camera-feed-box video {
      object-fit: cover !important;
      width: 100% !important;
      height: 100% !important;
    }
    .scanner-laser {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, transparent, #10b981, transparent);
      box-shadow: 0 0 8px #10b981;
      opacity: 0;
      z-index: 10;
      pointer-events: none;
    }
    .scanner-laser.active {
      animation: scanMotion 2s infinite ease-in-out;
      opacity: 1;
    }
    @keyframes scanMotion {
      0% { top: 5%; }
      50% { top: 95%; }
      100% { top: 5%; }
    }
    .scanner-corners {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 5;
    }
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 3px solid #ef4444;
      transition: border-color 0.3s ease;
    }
    .scanner-view-wrapper.scanning .corner {
      border-color: #10b981;
    }
    .corner.top-left {
      top: 12px;
      left: 12px;
      border-bottom: none;
      border-right: none;
      border-top-left-radius: 6px;
    }
    .corner.top-right {
      top: 12px;
      right: 12px;
      border-bottom: none;
      border-left: none;
      border-top-right-radius: 6px;
    }
    .corner.bottom-left {
      bottom: 12px;
      left: 12px;
      border-top: none;
      border-right: none;
      border-bottom-left-radius: 6px;
    }
    .corner.bottom-right {
      bottom: 12px;
      right: 12px;
      border-top: none;
      border-left: none;
      border-bottom-right-radius: 6px;
    }
    .scanner-controls {
      width: 100%;
      max-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-scan-toggle {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    .btn-scan-toggle.start {
      background-color: #10b981;
      color: #fff;
    }
    .btn-scan-toggle.start:hover {
      background-color: #059669;
    }
    .btn-scan-toggle.stop {
      background-color: #ef4444;
      color: #fff;
    }
    .btn-scan-toggle.stop:hover {
      background-color: #dc2626;
    }
    .last-scan-status {
      width: 100%;
      max-width: 280px;
      background-color: #f8fafc;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.85rem;
      text-align: center;
      border: 1px solid #e2e8f0;
      color: #64748b;
    }
    .last-scan-status strong {
      color: #10b981;
    }
    .manual-input-box {
      width: 100%;
      max-width: 280px;
    }
    .input-action-group {
      display: flex;
      gap: 8px;
    }
    .scan-input {
      flex: 1;
      background-color: #ffffff;
      border: 1px solid #cbd5e1;
      color: #0f172a;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .scan-input:focus {
      outline: none;
      border-color: #0284c7;
    }
    .console-log {
      width: 100%;
      max-width: 280px;
      height: 70px;
      background-color: #f8fafc;
      border-radius: 8px;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 0.7rem;
      overflow-y: auto;
      border: 1px solid #cbd5e1;
      color: #334155;
    }
  </style>
</head>
<body style="overflow-y: auto;">
  <!-- LOGIN SCREEN -->
  <div class="admin-login-container" id="scanner-login-screen" style="height: 100vh; background-color: #ffffff;">
    <div class="login-card" style="background-color: #f8fafc; border-color: #e2e8f0; color: #0f172a; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
      <div class="center-text margin-bottom">
        <div class="logo-icon" style="margin: 0 auto 12px; background-color: #0284c7; color: #fff;"><i class="fa-solid fa-mobile-screen"></i></div>
        <h2 style="color: #0f172a;">Phone Scanner Login</h2>
        <p class="help-text" style="color: #64748b;">Enter account credentials to pair phone</p>
      </div>
      <form id="form-scanner-login">
        <div class="form-group">
          <label for="scanner-login-email" style="color: #64748b;">Email Address</label>
          <input type="email" id="scanner-login-email" class="scan-input" required placeholder="pos1@test.com" style="width: 90%; margin-top: 6px; background-color: #fff; border-color: #cbd5e1; color: #0f172a;">
        </div>
        <div class="form-group margin-top">
          <label for="scanner-login-password" style="color: #64748b;">Password</label>
          <input type="password" id="scanner-login-password" class="scan-input" required placeholder="••••••••" style="width: 90%; margin-top: 6px; background-color: #fff; border-color: #cbd5e1; color: #0f172a;">
        </div>
        <div class="status-failed margin-top hidden" id="scanner-login-error-msg" style="font-size: 0.8125rem; font-weight: 600; text-align: center; color: var(--danger);">
          Invalid account credentials!
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg margin-top" style="background-color: #0284c7; color: #fff; width: 100%; border: none; padding: 12px; border-radius: 8px;">Connect Scanner</button>
      </form>
    </div>
  </div>

  <div id="scanner-main-layout" class="hidden">
    <div class="scanner-app">
      <div class="scanner-header-bar">
        <div class="scanner-logo">
          <i class="fa-solid fa-barcode"></i>
          <span>Terminal: <strong id="display-paired-target">POS-1</strong></span>
        </div>
        <div class="scanner-status">
          <span class="status-dot red" id="status-dot"></span>
          <span id="status-text">Not Scanning</span>
        </div>
      </div>

      <div class="scanner-main">
        <div class="scanner-view-wrapper not-scanning" id="scanner-view-wrapper">
          <div id="camera-feed-box"></div>
          <div class="scanner-laser" id="scanner-laser"></div>
          <div class="scanner-corners">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
          </div>
        </div>

        <div class="scanner-controls">
          <button class="btn-scan-toggle start" id="btn-scan-toggle" onclick="toggleScanner()">
            <i class="fa-solid fa-camera"></i> <span id="btn-scan-text">Start Scanning</span>
          </button>
        </div>

        <div class="last-scan-status" id="last-scan-status">
          Ready to scan barcode...
        </div>

        <div class="manual-input-box">
          <div class="input-action-group">
            <input type="text" id="manual-barcode" class="scan-input" placeholder="Type barcode manually...">
            <button class="btn btn-primary" onclick="sendManualScan()" style="border-radius: 8px;">Send</button>
          </div>
        </div>

        <div class="console-log" id="scan-console"></div>
      </div>
    </div>
  </div>

  <script src="../shared/app.js"></script>
  <script>
    let activeTarget = 'POS-1';
    let html5QrcodeScanner = null;
    let isScanning = false;

    document.addEventListener('DOMContentLoaded', () => {
      // Setup enter key listener on manual field
      document.getElementById('manual-barcode').onkeypress = (e) => {
        if (e.key === 'Enter') sendManualScan();
      };

      const loginScreen = document.getElementById('scanner-login-screen');
      const mainLayout = document.getElementById('scanner-main-layout');
      const displayTarget = document.getElementById('display-paired-target');

      const applyLogin = (user) => {
        // Derive target terminal from email (e.g., pos2@test.com -> POS-2)
        const numMatch = user.email.match(/\d+/);
        activeTarget = numMatch ? `POS-${numMatch[0]}` : 'POS-1';

        if (displayTarget) displayTarget.innerText = activeTarget;
        loginScreen.classList.add('hidden');
        mainLayout.classList.remove('hidden');

        startCamera();
        appendConsole(`Phone paired with Terminal target: ${activeTarget} (${user.name})`);
      };

      // Check session
      const savedUser = sessionStorage.getItem('current_scanner_user');
      if (savedUser) {
        applyLogin(JSON.parse(savedUser));
      }

      // Handle submit
      document.getElementById('form-scanner-login').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('scanner-login-email').value.trim();
        const pass = document.getElementById('scanner-login-password').value.trim();
        const errMsg = document.getElementById('scanner-login-error-msg');

        const matched = db.employees.find(emp => emp.email === email && emp.password === pass);
        if (matched) {
          errMsg.classList.add('hidden');
          sessionStorage.setItem('current_scanner_user', JSON.stringify(matched));
          applyLogin(matched);
        } else {
          errMsg.classList.remove('hidden');
        }
      });
    });

    function toggleScanner() {
      if (isScanning) {
        stopCamera();
      } else {
        startCamera();
      }
    }

    function startCamera() {
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const viewWrapper = document.getElementById('scanner-view-wrapper');
      const laser = document.getElementById('scanner-laser');
      const btnToggle = document.getElementById('btn-scan-toggle');
      const btnText = document.getElementById('btn-scan-text');

      statusDot.className = 'status-dot yellow';
      statusText.innerText = 'Starting...';

      html5QrcodeScanner = new Html5Qrcode("camera-feed-box");
      const config = { fps: 20, qrbox: { width: 200, height: 200 } };
      
      html5QrcodeScanner.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          sendScanEvent(decodedText);
          flashScanSuccess();
        }
      ).then(() => {
        isScanning = true;
        statusDot.className = 'status-dot green';
        statusText.innerText = 'Scanning';
        viewWrapper.className = 'scanner-view-wrapper scanning';
        laser.classList.add('active');
        btnToggle.className = 'btn-scan-toggle stop';
        btnText.innerText = 'Stop Scanning';
      }).catch(err => {
        isScanning = false;
        statusDot.className = 'status-dot red';
        statusText.innerText = 'Not Scanning';
        viewWrapper.className = 'scanner-view-wrapper not-scanning';
        laser.classList.remove('active');
        btnToggle.className = 'btn-scan-toggle start';
        btnText.innerText = 'Start Scanning';
        appendConsole("Camera access failed. Check permissions.");
      });
    }

    function stopCamera() {
      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => {
          html5QrcodeScanner = null;
          updateScannerStoppedUI();
        }).catch(err => {
          console.error("Failed to stop scanner", err);
          updateScannerStoppedUI();
        });
      } else {
        updateScannerStoppedUI();
      }
    }

    function updateScannerStoppedUI() {
      isScanning = false;
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const viewWrapper = document.getElementById('scanner-view-wrapper');
      const laser = document.getElementById('scanner-laser');
      const btnToggle = document.getElementById('btn-scan-toggle');
      const btnText = document.getElementById('btn-scan-text');

      statusDot.className = 'status-dot red';
      statusText.innerText = 'Not Scanning';
      viewWrapper.className = 'scanner-view-wrapper not-scanning';
      laser.classList.remove('active');
      btnToggle.className = 'btn-scan-toggle start';
      btnText.innerText = 'Start Scanning';
    }

    function flashScanSuccess() {
      const lastScanStatus = document.getElementById('last-scan-status');
      const viewWrapper = document.getElementById('scanner-view-wrapper');
      
      // Temporary bright green flash animation
      viewWrapper.style.borderColor = '#10b981';
      viewWrapper.style.boxShadow = '0 0 35px rgba(16, 185, 129, 0.9)';
      setTimeout(() => {
        if (isScanning) {
          viewWrapper.style.borderColor = '';
          viewWrapper.style.boxShadow = '';
        }
      }, 400);
    }

    function sendScanEvent(barcode) {
      if (!barcode) return;
      
      const payload = {
        barcode: barcode,
        target: activeTarget,
        timestamp: Date.now()
      };

      document.getElementById('last-scan-status').innerHTML = `Last Scanned: <strong>${barcode}</strong>`;

      // Set key to trigger storage event on other tabs locally
      localStorage.setItem('remote_scan_event', JSON.stringify(payload));
      
      // Post to Node server to distribute to other devices wirelessly
      if (serverMode) {
        fetch('/api/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).catch(err => console.error(err));
      }

      // Vibrate to confirm scan success
      if (navigator.vibrate) navigator.vibrate([150, 50, 150]);

      appendConsole(`SUCCESS: Sent barcode ${barcode} to target ${activeTarget}`);
    }

    function sendManualScan() {
      const field = document.getElementById('manual-barcode');
      const val = field.value.trim();
      if (val) {
        sendScanEvent(val);
        field.value = '';
      }
    }

    function appendConsole(msg) {
      const c = document.getElementById('scan-console');
      c.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
      c.scrollTop = c.scrollHeight;
    }
  </script>
</body>
</html>
