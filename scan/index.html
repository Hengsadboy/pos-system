<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Barcode Scanner</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      background-color: #ffffff;
      color: #0f172a;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .scanner-header {
      display: none !important;
    }
    .scanner-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 16px;
      position: relative;
    }
    #camera-feed-box {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #38bdf8;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
      background-color: #000;
      position: relative;
    }
    .scanner-target-select {
      width: 100%;
      max-width: 400px;
      margin-top: 20px;
      background-color: #1e293b;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #334155;
    }
    .target-label {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 8px;
      display: block;
    }
    .target-options {
      display: flex;
      gap: 12px;
    }
    .target-btn {
      flex: 1;
      background-color: #334155;
      border: 2px solid transparent;
      color: #f8fafc;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    .target-btn.active {
      background-color: #0369a1;
      border-color: #38bdf8;
      color: #fff;
    }
    .manual-input-box {
      width: 100%;
      max-width: 400px;
      margin-top: 16px;
    }
    .input-action-group {
      display: flex;
      gap: 8px;
    }
    .scan-input {
      flex: 1;
      background-color: #1e293b;
      border: 1px solid #334155;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
    }
    .scan-input:focus {
      outline: none;
      border-color: #38bdf8;
    }
    .console-log {
      width: 100%;
      max-width: 400px;
      height: 80px;
      background-color: #020617;
      border-radius: 8px;
      margin-top: 16px;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 0.75rem;
      overflow-y: auto;
      border: 1px solid #1e293b;
      color: #38bdf8;
    }
  </style>
</head>
<body style="overflow-y: auto;">
  <!-- LOGIN SCREEN -->
  <div class="admin-login-container" id="scanner-login-screen" style="height: 100vh; background-color: #ffffff;">
    <div class="login-card" style="background-color: #f8fafc; border-color: #e2e8f0; color: #0f172a; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
      <div class="center-text margin-bottom">
        <div class="logo-icon" style="margin: 0 auto 12px; background-color: #0284c7; color: #fff;"><i class="fa-solid fa-mobile-screen"></i></div>
        <h2 style="color: #0f172a;">Phone Scanner Login</h2>
        <p class="help-text" style="color: #64748b;">Enter account credentials to pair phone</p>
      </div>
      <form id="form-scanner-login">
        <div class="form-group">
          <label for="scanner-login-email" style="color: #64748b;">Email Address</label>
          <input type="email" id="scanner-login-email" class="scan-input" required placeholder="pos1@test.com" style="width: 90%; margin-top: 6px; background-color: #fff; border-color: #cbd5e1; color: #0f172a;">
        </div>
        <div class="form-group margin-top">
          <label for="scanner-login-password" style="color: #64748b;">Password</label>
          <input type="password" id="scanner-login-password" class="scan-input" required placeholder="••••••••" style="width: 90%; margin-top: 6px; background-color: #fff; border-color: #cbd5e1; color: #0f172a;">
        </div>
        <div class="status-failed margin-top hidden" id="scanner-login-error-msg" style="font-size: 0.8125rem; font-weight: 600; text-align: center; color: var(--danger);">
          Invalid account credentials!
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg margin-top" style="background-color: #0284c7; color: #fff; width: 100%; border: none; padding: 12px; border-radius: 8px;">Connect Scanner</button>
      </form>
    </div>
  </div>

  <div id="scanner-main-layout" class="hidden">
    <div class="scanner-main" style="padding: 0; height: 100vh; justify-content: center; align-items: center; display: flex;">
      <div id="camera-feed-box" style="width: 100vw; height: 100vh; max-width: 100vw; border-radius: 0; border: none; box-shadow: none;"></div>

      <div class="manual-input-box hidden" style="display: none;">
        <div class="input-action-group">
          <input type="text" id="manual-barcode" class="scan-input">
          <button class="btn btn-primary" onclick="sendManualScan()">Send</button>
        </div>
      </div>

      <div class="console-log hidden" id="scan-console" style="display: none;"></div>
    </div>
  </div>

  <script src="../shared/app.js"></script>
  <script>
    let activeTarget = 'POS-1';
    let html5QrcodeScanner = null;

    document.addEventListener('DOMContentLoaded', () => {
      // Setup enter key listener on manual field
      document.getElementById('manual-barcode').onkeypress = (e) => {
        if (e.key === 'Enter') sendManualScan();
      };

      const loginScreen = document.getElementById('scanner-login-screen');
      const mainLayout = document.getElementById('scanner-main-layout');
      const displayTarget = document.getElementById('display-paired-target');

      const applyLogin = (user) => {
        // Derive target terminal from email (e.g., pos2@test.com -> POS-2)
        const numMatch = user.email.match(/\d+/);
        activeTarget = numMatch ? `POS-${numMatch[0]}` : 'POS-1';

        if (displayTarget) displayTarget.innerText = activeTarget;
        loginScreen.classList.add('hidden');
        mainLayout.classList.remove('hidden');

        startCamera();
        appendConsole(`Phone paired with Terminal target: ${activeTarget} (${user.name})`);
      };

      // Check session
      const savedUser = sessionStorage.getItem('current_scanner_user');
      if (savedUser) {
        applyLogin(JSON.parse(savedUser));
      }

      // Handle submit
      document.getElementById('form-scanner-login').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('scanner-login-email').value.trim();
        const pass = document.getElementById('scanner-login-password').value.trim();
        const errMsg = document.getElementById('scanner-login-error-msg');

        const matched = db.employees.find(emp => emp.email === email && emp.password === pass);
        if (matched) {
          errMsg.classList.add('hidden');
          sessionStorage.setItem('current_scanner_user', JSON.stringify(matched));
          applyLogin(matched);
        } else {
          errMsg.classList.remove('hidden');
        }
      });
    });

    function startCamera() {
      html5QrcodeScanner = new Html5Qrcode("camera-feed-box");
      const config = { fps: 20, qrbox: { width: 250, height: 250 } };
      
      html5QrcodeScanner.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          sendScanEvent(decodedText);
        }
      ).catch(err => {
        appendConsole("Camera access failed. Check permissions.");
      });
    }

    function sendScanEvent(barcode) {
      if (!barcode) return;
      
      const payload = {
        barcode: barcode,
        target: activeTarget,
        timestamp: Date.now()
      };

      // Set key to trigger storage event on other tabs locally
      localStorage.setItem('remote_scan_event', JSON.stringify(payload));
      
      // Post to Node server to distribute to other devices wirelessly
      if (serverMode) {
        fetch('/api/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).catch(err => console.error(err));
      }

      // Vibrate to confirm scan success
      if (navigator.vibrate) navigator.vibrate([150, 50, 150]);

      appendConsole(`SUCCESS: Sent barcode ${barcode} to target ${activeTarget}`);
    }

    function sendManualScan() {
      const field = document.getElementById('manual-barcode');
      const val = field.value.trim();
      if (val) {
        sendScanEvent(val);
        field.value = '';
      }
    }

    function appendConsole(msg) {
      const c = document.getElementById('scan-console');
      c.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
      c.scrollTop = c.scrollHeight;
    }
  </script>
</body>
</html>
